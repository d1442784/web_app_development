{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="glass-card">
            <h3 class="mb-4 text-gradient">
                {% if vehicle %}
                <i class="fa-solid fa-pen-to-square me-2"></i>編輯車輛
                {% else %}
                <i class="fa-solid fa-plus me-2"></i>新增車輛
                {% endif %}
            </h3>
            
            <form method="POST">
                <div class="mb-3">
                    <label for="brand" class="form-label text-muted">廠牌 (Brand) <span class="text-danger">*</span></label>
                    <input type="text" class="form-control form-control-lg" id="brand" name="brand" value="{{ vehicle.brand if vehicle else '' }}" required placeholder="例如: SYM, YAMAHA, HONDA">
                </div>
                
                <div class="mb-3">
                    <label for="model_name" class="form-label text-muted">車款名稱 (Model) <span class="text-danger">*</span></label>
                    <input type="text" class="form-control form-control-lg" id="model_name" name="model_name" value="{{ vehicle.model_name if vehicle else '' }}" required placeholder="例如: DRG 2, R15M">
                </div>
                
                <div class="mb-4">
                    <label for="current_mileage" class="form-label text-muted">目前里程 (Mileage) <span class="text-danger">*</span></label>
                    <div class="input-group input-group-lg">
                        <input type="number" class="form-control" id="current_mileage" name="current_mileage" value="{{ vehicle.current_mileage if vehicle else '0' }}" required min="0">
                        <span class="input-group-text bg-transparent text-muted border-secondary">km</span>
                    </div>
                    <div class="form-text text-secondary mt-2"><i class="fa-solid fa-circle-info me-1"></i> 請填寫儀表板上顯示的總里程數</div>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mt-5">
                    <a href="{{ url_for('garage.index') }}" class="btn btn-outline-light border-secondary">取消</a>
                    <button type="submit" class="btn btn-glass-primary px-4">
                        <i class="fa-solid fa-save me-1"></i> 儲存
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
