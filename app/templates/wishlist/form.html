{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="glass-card">
            <h3 class="mb-4 text-gradient">
                {% if item %}
                <i class="fa-solid fa-pen-to-square me-2"></i>編輯願望
                {% else %}
                <i class="fa-solid fa-plus me-2"></i>新增願望
                {% endif %}
            </h3>
            
            <form method="POST">
                {% if not item %}
                <div class="mb-4">
                    <label for="vehicle_id" class="form-label text-muted">選擇車輛 <span class="text-danger">*</span></label>
                    <select class="form-select form-select-lg" id="vehicle_id" name="vehicle_id" required>
                        <option value="" disabled selected>-- 選擇要改裝的車輛 --</option>
                        {% for v in vehicles %}
                            <option value="{{ v.id }}">{{ v.brand }} {{ v.model_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                {% else %}
                <!-- 編輯時不允許改車輛，僅顯示 -->
                <div class="mb-4">
                    <label class="form-label text-muted">所屬車輛</label>
                    <div>
                        {% for v in vehicles %}
                            {% if v.id == item.vehicle_id %}
                                <span class="badge badge-glass fs-6">{{ v.brand }} {{ v.model_name }}</span>
                            {% endif %}
                        {% endfor %}
                    </div>
                </div>
                {% endif %}

                <div class="mb-4">
                    <label for="item_name" class="form-label text-muted">改裝品名稱 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control form-control-lg" id="item_name" name="item_name" value="{{ item.item_name if item else '' }}" required placeholder="例如: 歐林老師避震器、全取代電腦">
                </div>
                
                <div class="mb-4">
                    <label for="estimated_cost" class="form-label text-muted">預估花費</label>
                    <div class="input-group input-group-lg">
                        <span class="input-group-text bg-transparent text-muted border-secondary">$</span>
                        <input type="number" class="form-control" id="estimated_cost" name="estimated_cost" value="{{ item.estimated_cost if item else '0' }}" min="0">
                    </div>
                </div>

                {% if item %}
                <div class="mb-4 form-check form-switch fs-5">
                    <input class="form-check-input" type="checkbox" role="switch" id="is_installed" name="is_installed" {% if item.is_installed == 1 %}checked{% endif %}>
                    <label class="form-check-label ms-2" for="is_installed">
                        {% if item.is_installed == 1 %}
                            <span class="text-success"><i class="fa-solid fa-check me-1"></i>已安裝 (達成！)</span>
                        {% else %}
                            <span class="text-warning"><i class="fa-regular fa-clock me-1"></i>尚未安裝</span>
                        {% endif %}
                    </label>
                </div>
                {% endif %}
                
                <div class="d-flex justify-content-between align-items-center mt-5">
                    <a href="{{ url_for('wishlist.index') }}" class="btn btn-outline-light border-secondary">取消</a>
                    <button type="submit" class="btn btn-glass-primary px-4">
                        <i class="fa-solid fa-save me-1"></i> 儲存
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
